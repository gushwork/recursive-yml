name: Auto Release on Version Change

on:
  push:
    branches: [master]
    paths:
      - "package.json"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    outputs:
      version-changed: ${{ steps.version.outputs.changed }}
      current-version: ${{ steps.version.outputs.current }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check package.json version change
        id: version
        run: |
          current=$(jq -r '.version' package.json)
          prev=$(git show HEAD~1:package.json 2>/dev/null | jq -r '.version' || echo "")
          echo "current=$current" >> $GITHUB_OUTPUT
          if [ "$current" != "$prev" ] && [ -n "$prev" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        if: steps.version.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.current }}';
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${version}`,
              name: `v${version}`,
              generate_release_notes: true,
            });

  publish-npm:
    needs: release
    if: needs.release.outputs.version-changed == 'true'
    uses: ./.github/workflows/publish-npm.yml
    secrets: inherit
